            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://simplest-collector.observability.svc.cluster.local:4318/v1/traces"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.version=1.0.0,deployment.environment=task3.1"
